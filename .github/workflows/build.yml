name: Build wireproxy-awg

on: [push, pull_request]

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: go build -v -o wireproxy-awg-${{ matrix.os }}-${{ matrix.arch }} ./cmd/wireproxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wireproxy-awg-${{ matrix.os }}-${{ matrix.arch }}
          path: wireproxy-awg-${{ matrix.os }}-${{ matrix.arch }}
